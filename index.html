<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Convocation BTS 2025</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Cinzel:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f8f8f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: sans-serif;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem 3rem;
      text-align: center;
    }

    .emoji-god {
      font-size: 80px;
      margin-bottom: 1.5rem;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .label-dieu {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2.5rem, 10vw, 5rem);
      font-weight: 900;
      color: #111;
      letter-spacing: 0.06em;
      line-height: 1.1;
    }

    .label-nest {
      font-family: 'Cinzel', serif;
      font-size: clamp(1rem, 3.5vw, 1.6rem);
      font-weight: 400;
      color: #555;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin: 0.5rem 0;
    }

    .label-gawa {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2.8rem, 12vw, 6rem);
      font-weight: 900;
      background: linear-gradient(135deg, #e91e8c 0%, #f97316 60%, #facc15 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }

    .divider {
      width: 80px;
      height: 3px;
      background: #111;
      margin: 1.8rem auto;
      border-radius: 2px;
    }

    .subtitle {
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      color: #aaa;
      letter-spacing: 0.35em;
      text-transform: uppercase;
    }

    footer {
      width: 100%;
      background: #111;
      color: #eee;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .footer-name {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #fff;
      margin-bottom: 0.4rem;
    }

    .footer-phone {
      font-size: 0.95rem;
      color: #aaa;
      margin-bottom: 1.4rem;
    }

    .footer-phone a {
      color: #facc15;
      text-decoration: none;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .social-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .social-btn:hover { opacity: 0.85; transform: translateY(-2px); }
    .social-btn svg { width: 18px; height: 18px; fill: currentColor; }

    .btn-facebook { background: #1877f2; color: #fff; }
    .btn-whatsapp { background: #25d366; color: #fff; }

    .footer-copy {
      font-size: 0.75rem;
      color: #555;
    }
  </style>
</head>
<body>

  <main>
    <div class="emoji-god">🙏</div>
    <div class="label-dieu">DIEU</div>
    <div class="label-nest">n'est pas</div>
    <div class="label-gawa">GAWA</div>
    <div class="divider"></div>
    <div class="subtitle">La vérité éternelle ✦ 2025</div>
  </main>
